<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Changelog - Rotation Solver Reborn</title>
	<style>
		* {
			margin: 0;
			padding: 0;
			box-sizing: border-box;
		}

		body {
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
			line-height: 1.6;
			color: #333;
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			min-height: 100vh;
			padding: 20px;
		}

		.container {
			max-width: 1200px;
			margin: 0 auto;
			background: white;
			border-radius: 10px;
			box-shadow: 0 10px 40px rgba(0,0,0,0.2);
			overflow: hidden;
		}

		header {
			background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
			color: white;
			padding: 40px;
			text-align: center;
		}

		header h1 {
			font-size: 2.5em;
			margin-bottom: 10px;
		}

		nav {
			background: #f8f9fa;
			padding: 20px 40px;
			border-bottom: 2px solid #e9ecef;
		}

		nav a {
			display: inline-block;
			margin-right: 20px;
			padding: 10px 20px;
			background: #667eea;
			color: white;
			text-decoration: none;
			border-radius: 5px;
			transition: background 0.3s;
		}

		nav a:hover {
			background: #764ba2;
		}

		main {
			padding: 40px;
		}

		.release {
			margin-bottom: 40px;
			border-left: 4px solid #667eea;
			padding-left: 20px;
		}

		.release-header {
			display: flex;
			align-items: center;
			gap: 15px;
			margin-bottom: 15px;
		}

		.version {
			font-size: 1.8em;
			font-weight: bold;
			color: #667eea;
		}

		.date {
			color: #6c757d;
			font-size: 0.9em;
		}

		.release-body {
			background: #f8f9fa;
			padding: 20px;
			border-radius: 8px;
			white-space: pre-wrap;
			font-family: 'Consolas', 'Monaco', monospace;
			font-size: 0.95em;
		}

		.badge {
			display: inline-block;
			padding: 3px 8px;
			background: #28a745;
			color: white;
			border-radius: 3px;
			font-size: 0.8em;
			margin-left: 10px;
		}

		footer {
			background: #343a40;
			color: white;
			text-align: center;
			padding: 20px;
		}

		footer a {
			color: #667eea;
			text-decoration: none;
		}

		footer a:hover {
			text-decoration: underline;
		}

		.loading {
			text-align: center;
			padding: 40px;
			color: #667eea;
			font-size: 1.2em;
		}
	</style>
</head>
<body>
	<div class="container">
		<header>
			<h1>📋 Changelog</h1>
			<p>Release History for Rotation Solver Reborn</p>
		</header>

		<nav>
			<a href="https://github.com/FFXIV-CombatReborn/RotationSolverReborn/releases" target="_blank">View on GitHub</a>
		</nav>

		<main id="changelog-content">
			<div class="loading">Loading changelog...</div>
		</main>

		<footer>
			<p>
				&copy; 2024 Rotation Solver Reborn | 
				<a href="https://github.com/FFXIV-CombatReborn/RotationSolverReborn">GitHub</a> | 
				Last Updated: <span id="last-updated">-</span>
			</p>
		</footer>
	</div>

	<script>
		async function loadChangelog() {
			try {
				const response = await fetch('changelog.json');
				const data = await response.json();

				const content = document.getElementById('changelog-content');
				content.innerHTML = '';

				if (data.releases && data.releases.length > 0) {
					data.releases.forEach(release => {
						const releaseDiv = document.createElement('div');
						releaseDiv.className = 'release';

						const releaseDate = new Date(release.published_at).toLocaleDateString('en-US', {
							year: 'numeric',
							month: 'long',
							day: 'numeric'
						});

						releaseDiv.innerHTML = `
							<div class="release-header">
								<span class="version">${release.tag_name}</span>
								<span class="date">${releaseDate}</span>
								${release.prerelease ? '<span class="badge" style="background: #ffc107;">Pre-release</span>' : '<span class="badge">Release</span>'}
							</div>
							<div class="release-body">${release.body || 'No release notes provided.'}</div>
						`;

						content.appendChild(releaseDiv);
					});

					document.getElementById('last-updated').textContent = new Date(data.generated_at).toLocaleString();
				} else {
					content.innerHTML = '<div class="loading">No releases found.</div>';
				}
			} catch (error) {
				console.error('Error loading changelog:', error);
				document.getElementById('changelog-content').innerHTML = 
					'<div class="loading" style="color: #dc3545;">Failed to load changelog. Please try again later.</div>';
			}
		}

		loadChangelog();
	</script>
</body>
</html>
