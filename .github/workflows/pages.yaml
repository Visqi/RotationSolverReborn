name: Deploy GitHub Pages

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Publish"]
    types:
      - completed
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yaml'

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Changelog JSON
        shell: pwsh
        run: |
          .github/scripts/generate-changelog.ps1 -Repository "${{ github.repository }}" -Token "${{ secrets.GITHUB_TOKEN }}" -MaxReleases 50

      - name: Commit Changelog
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          if [ -f "docs/changelog.json" ]; then
            git add docs/changelog.json
            git diff --staged --quiet || git commit -m "Update changelog [skip ci]"
            git push
          else
            echo "No changelog.json found, skipping commit"
          fi

  deploy:
    needs: update-changelog
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
